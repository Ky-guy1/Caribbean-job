<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Skill Link — Job Board</title>
   <!-- Change line 8 to point to the correct Tailwind CDN script file -->
   <script src="https://cdn.tailwindcss.com"></script>

  <script>
    // Initialize dark mode class on html tag before rendering body
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }

    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            ocean: { 400: '#22d3ee', 500: '#06b6d4', 600: '#0891b2' },
            coral: { 400: '#fb7185', 500: '#f43f5e' },
          },
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            card: '0 4px 24px -4px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.06)',
            cardLight: '0 4px 18px -4px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.05)',
            glow: '0 0 40px -8px rgba(6,182,212,0.35)',
          },
          animation: {
            'shimmer': 'shimmer 1.8s infinite linear',
          },
          keyframes: {
            shimmer: {
              '0%': { backgroundPosition: '-200% 0' },
              '100%': { backgroundPosition: '200% 0' },
            }
          }
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    @supports (padding: max(0px)) {
      body { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
      header { padding-top: max(0px, env(safe-area-inset-top)); }
    }
    .card-shine {
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 50%);
    }
    /* Dynamic backdrop background configurations */
    .bg-shimmer-effect {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
    }
    .dark .bg-shimmer-effect {
      background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
      background-size: 200% 100%;
    }
    html:not(.dark) .bg-shimmer-effect {
      background: linear-gradient(90deg, rgba(0,0,0,0.03) 25%, rgba(0,0,0,0.06) 50%, rgba(0,0,0,0.03) 75%);
      background-size: 200% 100%;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-[#0a0f1a] font-sans text-slate-800 dark:text-slate-100 antialiased transition-colors duration-300">
  <!-- Ambient background blobs -->

    <div class="absolute -top-32 left-1/2 h-96 w-96 -translate-x-1/2 rounded-full bg-cyan-500/10 dark:bg-cyan-500/20 blur-3xl"></div>
    <div class="absolute bottom-0 right-0 h-80 w-80 rounded-full bg-rose-500/5 dark:bg-rose-500/10 blur-3xl"></div>

    <!-- Sticky header + search -->

      <div class="px-4 pb-4 pt-5 sm:px-5">
        <div class="flex items-center justify-between">
                    <!-- 🌀 Perfectly Aligned Skill Link Brand Header Frame -->
                    <div class="flex items-center gap-4 flex-1 min-w-0">
                      <!-- 🎨 Jumbo High-Visibility Skill Link Logo Container -->
                      <div class="flex h-16 w-16 shrink-0 items-center justify-center overflow-hidden rounded-2xl bg-[#14151f] border border-white/[0.08] shadow-[0_6px_16px_rgba(0,0,0,0.5)] p-0.5 transition duration-150 active:scale-95">
                        <img 
                          src="logo.png" 
                          alt="Skill Link Logo"

                        />
                      </div>
                      
                      <!-- 🔤 High-Contrast Typography Lockup Block -->

                      </div>
                    </div>
          
          
          <!-- Dark Mode Toggle Button Component Feature C -->
          <button id="theme-toggle" type="button" class="rounded-xl p-2.5 text-slate-500 dark:text-slate-400 hover:bg-slate-200/50 dark:hover:bg-white/10 transition" aria-label="Toggle Theme">

          </button>
        </div>

        <div class="relative mt-4">
          <svg class="pointer-events-none absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400 dark:text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <input
            id="search"
            type="search"
            placeholder="Search title or company…"
            autocomplete="off"
            class="w-full rounded-2xl border border-slate-200 dark:border-white/10 bg-white dark:bg-white/[0.04] py-3.5 pl-12 pr-10 text-[15px] text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 outline-none transition focus:border-cyan-500/50 focus:bg-white focus:dark:bg-white/[0.07] focus:ring-2 focus:ring-cyan-500/20 shadow-sm dark:shadow-none"

            All

          <button
            type="button"

            data-filter="jobs"

            class="listing-tab rounded-full px-3.5 py-1.5 text-xs font-bold transition bg-white border border-slate-200 dark:border-none dark:bg-white/[0.04] text-slate-500 dark:text-slate-400 ring-1 ring-black/[0.03] dark:ring-white/10 hover:bg-slate-100 dark:hover:bg-white/[0.08] hover:text-slate-700 dark:hover:text-slate-200 shadow-sm dark:shadow-none"
          >
            Corporate Jobs

          <button
            type="button"
            role="tab"
            data-filter="summer"
            aria-selected="false"
            class="listing-tab rounded-full px-3.5 py-1.5 text-xs font-bold transition bg-white border border-slate-200 dark:border-none dark:bg-white/[0.04] text-slate-500 dark:text-slate-400 ring-1 ring-black/[0.03] dark:ring-white/10 hover:bg-slate-100 dark:hover:bg-white/[0.08] hover:text-slate-700 dark:hover:text-slate-200 shadow-sm dark:shadow-none"

        <p id="meta" class="mt-3 text-xs font-medium text-slate-400 dark:text-slate-500">Loading…</p>

    <main class="px-4 pb-8 pt-2 sm:px-5">
      <!-- WhatsApp alerts subscription -->
      <section
        id="alerts-section"
        class="mb-5 hidden overflow-hidden rounded-3xl border border-emerald-500/20 bg-gradient-to-br from-emerald-500/5 dark:from-emerald-500/10 via-transparent dark:via-white/[0.04] to-cyan-500/5 dark:to-cyan-500/10 p-5 shadow-cardLight dark:shadow-card"
      >
        <div class="flex items-start gap-3">
          <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-emerald-500/10 dark:bg-emerald-500/20 text-emerald-600 dark:text-emerald-400 ring-1 ring-emerald-500/20 dark:ring-emerald-500/30">
            <svg class="h-6 w-6" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
     
              <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-emerald-500/20 text-emerald-400 ring-1 ring-emerald-500/30">
                <!-- 🟢 Official Crisp WhatsApp Icon -->
                <svg class="h-6 w-6" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

                </svg>
              </div>
    

          </div>
          <div class="min-w-0 flex-1">
            <h2 class="text-base font-bold text-slate-900 dark:text-white">Instant WhatsApp Job Alerts</h2>
            <p class="mt-0.5 text-xs leading-relaxed text-slate-600 dark:text-slate-400">Never miss a role. Get notified the moment new jobs match your category.</p>  
  
          </div>
        </div>
        <form id="subscribe-form" class="mt-4 space-y-3" novalidate>
          <div>
            <label for="phone" class="mb-1.5 block text-xs font-semibold uppercase tracking-wide text-slate-400">WhatsApp number</label>
            <input id="phone" name="phone" type="tel" inputmode="tel" placeholder="+1 784 555 1234" required class="w-full rounded-2xl border border-white/10 bg-[#0a0f1a]/60 px-4 py-3.5 text-[15px] text-white placeholder-slate-600 outline-none transition focus:border-emerald-500/50" />
          </div>
          <div>
            <label for="category" class="mb-1.5 block text-xs font-semibold uppercase tracking-wide text-slate-400">Job category</label>
            <div class="relative">
              <select id="category" name="category" required class="w-full appearance-none rounded-2xl border border-white/10 bg-[#0a0f1a]/60 px-4 py-3.5 pr-10 text-[15px] text-white outline-none">
                <option value="" disabled selected>Select a category…</option>
                <option value="Tech">Tech — IT, engineering, data</option>
                <option value="Admin">Admin — office, HR, finance</option>
                <option value="Retail">Retail — sales, customer service</option>

              <svg class="pointer-events-none absolute right-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /></svg>

      <!-- Custom Skeleton Loader Cards -->
      <div id="loading" class="space-y-3">
        <div class="shimmer-bg relative overflow-hidden h-32 w-full rounded-3xl border border-white/[0.07] bg-white/[0.03] p-5">
          <div class="flex gap-4"><div class="h-12 w-12 rounded-2xl bg-white/5"></div><div class="flex-1 space-y-2 py-1"><div class="h-4 bg-white/5 rounded w-3/4"></div><div class="h-3 bg-white/5 rounded w-1/2"></div></div></div>
        </div>
      </div>

      <div id="error" class="hidden rounded-3xl border border-rose-500/20 bg-rose-500/10 p-6 text-center">
        <p class="font-semibold text-rose-200">Could not load jobs</p>
        <p id="error-detail" class="mt-2 text-sm text-rose-300/70"></p>
      </div>

      <div id="empty" class="hidden rounded-3xl border border-white/[0.06] bg-white/[0.03] px-6 py-14 text-center">
        <p class="text-base font-semibold text-slate-200">No matching listings found</p>

      <ul id="job-list" class="hidden space-y-3"></ul>
    </main>
  </div>

  <template id="job-card-template">
    <li>
      <a class="job-card group relative block overflow-hidden rounded-3xl border border-white/[0.07] bg-white/[0.04] p-4 shadow-card transition active:scale-[0.99] sm:p-5" target="_blank" rel="noopener noreferrer">
        <div class="card-shine pointer-events-none absolute inset-0 opacity-0 transition group-hover:opacity-100"></div>
        <div class="relative flex gap-4">
          <div class="job-avatar flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl bg-gradient-to-br from-cyan-500/30 to-rose-500/20 text-sm font-bold text-cyan-200 ring-1 ring-white/10"></div>
          <div class="min-w-0 flex-1">
            <            <h2 class="job-title line-clamp-2 text-[15px] font-semibold leading-snug text-slate-900 dark:text-white group-hover:text-cyan-600 dark:group-hover:text-cyan-100"></h2>
            <p class="job-company mt-1 truncate text-sm text-slate-600 dark:text-slate-400"></p>

            <div class="mt-2 flex flex-wrap gap-1.5">
              <span class="job-listing-type hidden inline-block rounded-lg px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide"></span>
              <span class="job-category inline-block rounded-lg px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide"></span>
              <span class="job-source inline-block rounded-lg px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide"></span>
            </div>
          </div>
        </div>
      </a>
    </li>
  </template>

  <script>
    // 1. Element Selectors
    const listEl = document.getElementById('job-list');
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error');
    const emptyEl = document.getElementById('empty');
    const metaEl = document.getElementById('meta');
    const searchEl = document.getElementById('search');
    const clearBtn = document.getElementById('clear-search');
    const template = document.getElementById('job-card-template');
    const alertsSection = document.getElementById('alerts-section');
    const listingTabs = document.getElementById('listing-tabs');
    const themeToggleBtn = document.getElementById('theme-toggle');
    const darkIcon = document.getElementById('theme-toggle-dark-icon');
    const lightIcon = document.getElementById('theme-toggle-light-icon');

    // 2. Global State Tracking
    let allJobs = [];
    let activeListingFilter = 'all';

    // 3. Theme Toggle Setup
    if (localStorage.getItem('color-theme') === 'light' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: light)').matches)) {
      document.documentElement.classList.add('light'); document.documentElement.classList.remove('dark');
      if (lightIcon) lightIcon.classList.remove('hidden');
    } else {
      document.documentElement.classList.add('dark'); document.documentElement.classList.remove('light');
      if (darkIcon) darkIcon.classList.remove('hidden');
    }

    if (themeToggleBtn) {
      themeToggleBtn.addEventListener('click', () => {
        if (darkIcon) darkIcon.classList.toggle('hidden');
        if (lightIcon) lightIcon.classList.toggle('hidden');
        const isLight = document.documentElement.classList.toggle('light');
        document.documentElement.classList.toggle('dark', !isLight);
        localStorage.setItem('color-theme', isLight ? 'light' : 'dark');
      });
    }

    // 4. Helper Functions
    function companyInitials(name) {
      if (!name) return '?';
      const words = name.trim().split(/\s+/).filter(Boolean);
      if (!words.length) return '?';
      if (words.length === 1) return words[0].slice(0, 2).toUpperCase();
      return (words[0][0] + (words[1] ? words[1][0] : '')).toUpperCase();
    }

    function listingTypeOf(job) {
      return job.listing_type || 'Job';
    }

    function applyListingFilter(jobs) {
      if (activeListingFilter === 'jobs') {
        return jobs.filter((j) => listingTypeOf(j) === 'Job');
      }
      if (activeListingFilter === 'summer') {
        return jobs.filter((j) => listingTypeOf(j) === 'Summer Program');
      }
      return jobs;
    }

    // 5. Core Render Engine
    function renderJobs(jobs) {
      if (!listEl || !template) return;
      listEl.innerHTML = '';
      const fragment = document.createDocumentFragment();

      jobs.forEach((job) => {
        const node = template.content.cloneNode(true);
        node.querySelector('.job-title').textContent = job.title;
        node.querySelector('.job-company').textContent = job.company;
        node.querySelector('.job-avatar').textContent = companyInitials(job.company);
        
        const a = node.querySelector('.job-card');
        if (a) a.href = job.url || '#';
        
        fragment.appendChild(node);
      });

      listEl.appendChild(fragment);
      listEl.classList.toggle('hidden', jobs.length === 0);
      if (emptyEl) emptyEl.classList.toggle('hidden', jobs.length > 0);
      if (metaEl) metaEl.textContent = `${jobs.length} listings displayed`;
    }

    // 6. Filtering & Event Handler Engine
    function onSearchInput() {
      const value = searchEl ? searchEl.value : '';
      if (clearBtn) clearBtn.classList.toggle('hidden', !value);
      
      // Filter by the active tab first
      const tabFilteredPool = applyListingFilter(allJobs);
      
      // Then filter by search text if a user is typing
      const q = value.trim().toLowerCase();
      if (!q) {
        renderJobs(tabFilteredPool);
      } else {
        const fullyFiltered = tabFilteredPool.filter(
          (j) =>
            j.title.toLowerCase().includes(q) ||
            j.company.toLowerCase().includes(q)
        );
        renderJobs(fullyFiltered);
      }
    }

    function setActiveTab(filter) {
      activeListingFilter = filter;
      // 🟢 Premium High-Contrast Neon-Green / Deep Matte Charcoal Theme Matrix tokens
      const TAB_ACTIVE = 'bg-[#CCFF00] text-black ring-1 ring-[#CCFF00]/30 shadow-[0_0_20px_rgba(204,255,0,0.15)]';
      const TAB_INACTIVE = 'bg-white/[0.04] text-slate-400 ring-1 ring-white/10 hover:bg-white/[0.08] hover:text-slate-200';
      
      if (listingTabs) {
        listingTabs.querySelectorAll('button').forEach((tab) => {
          const isActive = tab.dataset.filter === filter;
          tab.setAttribute('aria-selected', isActive ? 'true' : 'false');
          // Applies the clean pill shape and transitions the active green state smoothly to whichever button you tap!
          tab.className = `listing-tab rounded-full px-4 py-2 text-xs font-bold transition-all duration-150 ${isActive ? TAB_ACTIVE : TAB_INACTIVE}`;
        });
      }
    }


    // 7. Event Listeners Connection
    if (listingTabs) {
      listingTabs.addEventListener('click', (e) => {
        const tab = e.target.closest('button');
        if (!tab) return;
        setActiveTab(tab.dataset.filter);
        onSearchInput();
      });
    }

    if (searchEl) searchEl.addEventListener('input', onSearchInput);
    
    if (clearBtn) {
      clearBtn.addEventListener('click', () => {
        if (searchEl) {
          searchEl.value = '';
          onSearchInput();
          searchEl.focus();
        }
      });
    }

    // 8. Initialization Data Loader
    async function loadJobs() {
      try {
        let res = await fetch('/api/jobs', { cache: 'no-store' });
        if (res.ok) return res.json();
        res = await fetch('jobs.json', { cache: 'no-store' });
        return res.json();
      } catch (e) { 
        return { jobs: [] }; 
      }
    }

    async function init() {
      const data = await loadJobs();
      
      if (Array.isArray(data)) {
        allJobs = data;
      } else if (data && Array.isArray(data.jobs)) {
        allJobs = data.jobs;
      } else {
        allJobs = [];
      }

      if (loadingEl) loadingEl.classList.add('hidden');
      if (alertsSection) alertsSection.classList.remove('hidden');
      
      // Render initial setup
      onSearchInput();
    }
